<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WorkTimeBudget</title>
  <style>
    :root {
      --fg: #263238;
      --muted: #546e7a;
      --line: #cfd8dc;
      --ok: #66bb6a;
      --hint: #90a4ae;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      width: 280px;
      margin: 0;
      padding: 14px 16px;
      color: var(--fg);
    }
    h1 {
      font-size: 14px;
      margin: 0 0 8px;
    }
    p.guide {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      margin: 0 0 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    label {
      font-size: 12px;
    }
    input[type="number"] {
      width: 64px;
      padding: 4px 6px;
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      text-align: right;
    }
    input:invalid {
      border-color: #e57373;
    }
    .saved {
      font-size: 11px;
      color: var(--ok);
      opacity: 0;
      transition: opacity .2s;
      margin-left: 6px;
    }
    .saved.show {
      opacity: 1;
    }
    .footer {
      font-size: 10px;
      color: var(--hint);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>WorkTimeBudget</h1>
  <p class="guide">hr.com2us.com 근태 페이지에서 월 잔여 근무시간을 자동으로 안내합니다.</p>
  <div class="row">
    <label for="daily-hours">하루 표준 근무시간</label>
    <div>
      <input id="daily-hours" type="number" min="0.5" max="24" step="0.5" value="8">
      <span>시간</span>
      <span id="saved" class="saved">저장됨</span>
    </div>
  </div>
  <div class="footer">설정은 자동 저장되며 다음 페이지 로드부터 반영됩니다.</div>
  <script src="popup.js"></script>
</body>
</html>
